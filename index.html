<!Doctype html>
<html> 
 <head> 
  <meta charset="utf-8"> 
  <title> 
                 Heart Beat Animation 
         </title> 
  <style>
        body {
                background: #fff none repeat scroll 0 0;
                color: #999;
                font-size: 100%;
                line-height: 24px;
                margin: 0;
                padding: 0;
                font-family: sans-serif;
            }
            
            .container {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            
            .heart-rate {
                width: 150px;
                height: 73px;
                position: relative;
                margin: 20px auto;
            }
            
            .fade-in {
                position: absolute;
                width: 100%;
                height: 100%;
                background-color: #fff;
                top: 0;
                right: 0;
                animation: heartRateIn 2.5s linear infinite;
            }
            
            .fade-out {
                position: absolute;
                width: 120%;
                height: 100%;
                background-color: #fff;
                top: 0;
                right: -120%;
                animation: heartRateOut 2.5s linear infinite;
                background: rgb(255, 255, 255);
                background: linear-gradient(to right, rgb(255, 255, 255) 0%, rgb(255, 255, 255) 80%, rgba(255, 255, 255, 0) 100%);
            }
            
            @keyframes heartRateIn {
                0% {
                    width: 100%;
                }
                50% {
                    width: 0;
                }
                100% {
                    width: 0;
                }
            }
            
            @keyframes heartRateOut {
                0% {
                    left: -120%;
                }
                30% {
                    left: -120%;
                }
                100% {
                    left: 0;
                }
            }
  </style>
 </head> 
 <body> 
  <section> 
   <div class="container"> 
    <div class="content"> 
     <div class="heart-rate"> 
      <svg version="1.0" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px" width="150px" height="73px" viewbox="0 0 150 73" enable-background="new 0 0 150 73" xml:space="preserve"> <polyline fill="none" stroke="#009B9E" stroke-width="3" stroke-miterlimit="10" points="0,45.486 38.514,45.486 44.595,33.324 50.676,45.486 57.771,45.486 62.838,55.622 71.959,9 80.067, 
     63.729 84.122,45.486 97.297,45.486 103.379,40.419 110.473,45.486 150,45.486" /> 
      </svg> 
      <div class="fade-in"> 
      </div> 
      <div class="fade-out"> 
      </div> 
     </div> 
    </div> 
   </div> 
  </section> 
 </body>
</html>
